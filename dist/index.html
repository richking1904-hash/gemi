swoTCoCDDrMKVwojDrMKXwpDDrMKEwpwgw6rCs8Kgw6rCsMKdw6zCncKEIMOswp3CkcOrwozCgMOtwpXCoCDDqsKywoNdDQo9PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09";
        let G_TXT = (encodedData === "error") ? "" : atob(encodedData);
        function switchPage(id) { ['mainPage', 'promoPage', 'contactPage'].forEach(el => document.getElementById(el).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        
        // 👑 [교정 및 보강] 챗봇 창을 토글할 때 최초 1회만 자기소개/인삿말 카드를 완벽하게 동적 인서트하는 시스템
        let isWelcomeInserted = false;
        document.getElementById('chatToggleBtn').addEventListener('click', () => {
            const chatWin = document.getElementById('chatWindow');
            chatWin.classList.toggle('hidden');
            
            if (!chatWin.classList.contains('hidden') && !isWelcomeInserted) {
                const msgZone = document.getElementById('widgetMsgZone');
                const welcomeHtml = `
                    <div id="gemiWelcomeMsg" class="flex flex-col items-start mb-2 order-first">
                        <div class="bg-[#333] p-3 rounded-2xl text-[11px] text-white leading-relaxed break-keep">
                            안녕하세요! 디렉터 \${"sadfsa"}님의 프로젝트 안내를 보조하는 AI 팀원입니다. ✨<br><br>전체적인 포트폴리오 안내 및 견적 문의에 대해 성심성의껏 안내해 드릴게요. 궁금한 점을 편하게 말씀해 주세요!
                        </div>
                    </div>
                `;
                msgZone.insertAdjacentHTML('beforeend', welcomeHtml);
                isWelcomeInserted = true;
                msgZone.scrollTop = msgZone.scrollHeight;
            }
        });
        
        function clickFaqButton(e, btnElement) {
            const questionText = btnElement.innerText.trim();
            const inputField = document.getElementById('widgetInput');
            if (inputField) {
                inputField.value = questionText;
                sendAiMessage(e);
            }
        }

        async function submitEstimate() {
            const btn = document.getElementById('submitBtn');
            if (!btn) return;
            
            const nameEl = document.getElementById('formClientName');
            const phoneEl = document.getElementById('formClientPhone');
            const typeEl = document.getElementById('formProjectType');
            const budgetEl = document.getElementById('formBudget');
            const descEl = document.getElementById('formProjectDesc');
            
            if(!nameEl || !nameEl.value.trim()){
                alert("디렉터님이 성함을 알아야 연락드릴 수 있습니다. 이름 또는 브랜드명을 입력해주세요.");
                nameEl.focus(); return;
            }
            if(!phoneEl || !phoneEl.value.trim()){
                alert("연락처를 남겨주셔야 문의 내용에 대한 답변을 드릴 수 있습니다.");
                phoneEl.focus(); return;
            }

            const data = { 
                name: nameEl.value, 
                phone: phoneEl.value, 
                type: typeEl ? typeEl.value : '', 
                budget: budgetEl ? budgetEl.value : '', 
                desc: descEl ? descEl.value : '' 
            };
            
            btn.innerText = "SENDING...";
            btn.disabled = true;
            
            try {
                await fetch('${SUPABASE_URL}/rest/v1/gemi_customer_inquiry', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": "${SUPABASE_KEY}",
                        "Authorization": "Bearer ${SUPABASE_KEY}"
                    },
                    body: JSON.stringify({
                        brand_name: "safsd",
                        customer_name: data.name,
                        customer_contact: data.phone,
                        inquiry_type: data.type,
                        message: `[예산: ${data.budget}] ${data.desc}`
                    })
                });

                fetch('https://gemi-5vfl.onrender.com/api/submit-inquiry', { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ 
                        customer_name: data.name, 
                        customer_contact: data.phone, 
                        inquiry_type: data.type, 
                        message: `[예산: ${data.budget}] ${data.desc}` 
                    }) 
                });
                
                alert("문의가 정상 전송되었습니다!");
            } catch (error) {
                alert("전송 중 오류가 발생했습니다: " + error.message);
            } finally {
                btn.innerText = "SUBMIT BRIEF";
                btn.disabled = false;
                switchPage('mainPage');
            }
        }

        async function sendAiMessage(e) {
            if(e && typeof e.preventDefault === 'function') e.preventDefault();

            const input = document.getElementById('widgetInput');
            const text = input.value.trim();
            if(!text) return;
            
            document.getElementById('widgetMsgZone').insertAdjacentHTML('beforeend', `<div class="flex flex-col items-end mb-2"><div class="bg-[#C5A059] p-3 rounded-2xl text-[11px] text-black">${text}</div></div>`);
            input.value = '';
            
            try {
                const safeGuideline = G_TXT
                    .replace(/\\/g, '\\\\')
                    .replace(/"/g, '\\"')
                    .replace(/\n/g, '\\n')
                    .replace(/\r/g, '\\r')
                    .replace(/\t/g, '\\t');

                const response = await fetch('https://gemi-5vfl.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text, 
                        guideline_txt: safeGuideline,
                        brand_name: "safsd"
                    })
                });
                const data = await response.json();
                
                if (data.reply && data.reply.includes("오늘 준비된 대화 개수")) {
                    input.placeholder = "대화 한도가 소진되었습니다.";
                    input.disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                }

                document.getElementById('widgetMsgZone').insertAdjacentHTML('beforeend', `<div class="flex flex-col items-start mb-2"><div class="bg-[#333] p-3 rounded-2xl text-[11px] text-white break-keep leading-relaxed">${data.reply || data.error}</div></div>`);
                document.getElementById('widgetMsgZone').scrollTop = document.getElementById('widgetMsgZone').scrollHeight;
            } catch(e) {
                document.getElementById('widgetMsgZone').insertAdjacentHTML('beforeend', `<div class="text-[10px] text-red-500">통신 실패: ${e.message}</div>`);
            }
        }
        document.getElementById('sendBtn').addEventListener('click', sendAiMessage);
        document.getElementById('widgetInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAiMessage(e); });
    </script>
