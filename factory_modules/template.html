<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>${user_name} - ${brand_name}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --dark-bg: #121314; }
        body { background-color: var(--dark-bg); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; overflow: hidden; }
        .serif { font-family: 'Bodoni Moda', serif; }
        
        /* 👑 [사각 테두리 규격 순정 유지 + 내부 공간 최적화] */
        .centered-card { 
            width: 100%; 
            max-width: 410px; 
            height: calc(100vh - 30px); 
            max-height: 90vh; 
            background-color: #1a1c1e; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 32px; 
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }
        
        #mainPage { overflow-y: auto; }
        #mainPage::-webkit-scrollbar { width: 0px; } 

        /* 👑 [하단 가림 원천 해결 단추] 이미지 높이 비중을 55% -> 45%로 컴팩트 조율 */
        .card-image-wrapper { width: 100%; height: 45%; position: relative; overflow: hidden; flex-shrink: 0; }
        .card-content-wrapper { flex: 1; padding: 22px; display: flex; flex-direction: column; justify-content: space-between; background: #1a1c1e; }
        
        .sub-page-content { flex: 1; overflow-y: auto; padding: 24px; background: #0c0d0e; }
        .sub-page-content::-webkit-scrollbar { width: 3px; }
        .sub-page-content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        
        .smart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; width: 100%; }
        
        /* 👑 [유동형 드래그 챗봇 레이어] 초기 고정 배치를 풀고 터치 간섭 현상을 차단 */
        .floating-chat-widget { position: absolute; bottom: 24px; right: 24px; z-index: 100; touch-action: none; user-select: none; }
        .chat-toggle-btn { width: 52px; height: 52px; background-color: #ffffff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid var(--gold); cursor: grab; transition: transform 0.2s, border-color 0.2s; }
        .chat-toggle-btn:active { cursor: grabbing; transform: scale(0.95); }
        .chat-window { width: 310px; height: 410px; background: #191b1d; border: 1px solid var(--gold); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; }
        
        .widget-msg-zone { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .widget-msg-zone::-webkit-scrollbar { width: 3px; }
        .widget-msg-zone::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .hidden { display: none !important; }
        input, textarea { background: #1a1c1e !important; border: 1px solid #333 !important; color: white !important; border-radius: 12px !important; padding: 12px !important; width: 100%; outline: none; }
        input:focus, textarea:focus { border-color: var(--gold) !important; }
        .gold-btn { background: var(--gold); color: #000; font-weight: 700; border-radius: 14px; padding: 14px; width: 100%; transition: 0.3s; }
    </style>
</head>
<body class="antialiased font-sans text-stone-200">
    <div class="centered-card">
        <div id="mainPage" class="w-full h-full flex flex-col">
            <div class="card-image-wrapper">
                <img src="${main_image_url}" class="w-full h-full object-cover grayscale-[20%]">
                <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#1a1c1e] opacity-100"></div>
            </div>
            <div class="card-content-wrapper">
                <div class="text-center">
                    <h1 class="text-3xl font-bold tracking-tight text-white mb-1 serif italic">${user_name}</h1>
                    <p class="text-[10px] text-[#C5A059] font-bold uppercase tracking-[4px] mb-2.5">${brand_name}</p>
                    <p class="text-xs text-stone-400 font-light leading-relaxed max-w-[280px] mx-auto break-keep mb-3">${INTRODUCTION}</p>
                </div>
                
                <div class="flex flex-col items-center gap-3 bg-white/5 py-3 px-4 rounded-2xl border border-white/5 mb-4">
                    <div class="flex justify-center gap-5 text-[11px] text-stone-300 items-center w-full border-b border-white/5 pb-2">
                        <a href="tel:${PHONE}" class="hover:text-white transition-colors flex items-center gap-1.5"><span>📞</span> <span class="font-medium tracking-wider">Call</span></a>
                        <span class="text-stone-600">|</span>
                        <span class="tracking-wide">✉️ ${EMAIL}</span>
                    </div>
                    <div class="flex justify-center gap-6 items-center" style="${SNS1_DISPLAY}">
                        <a href="${SNS1_URL}" target="_blank" id="snsIconBtn1" class="text-stone-400 hover:text-white transition-colors" title="${SNS1_TYPE}"></a>
                        <a href="${SNS2_URL}" target="_blank" id="snsIconBtn2" style="${SNS2_DISPLAY}" class="text-stone-400 hover:text-white transition-colors" title="${SNS2_TYPE}"></a>
                    </div>
                </div>

                <div class="smart-grid">
                    <button onclick="switchPage('promoPage')" class="bg-stone-800 text-stone-200 font-bold text-[11px] py-3.5 rounded-2xl border border-white/5 tracking-widest uppercase hover:bg-stone-700 transition-colors">Portfolio</button>
                    <button onclick="switchPage('contactPage')" class="gold-btn text-[11px] py-3.5 tracking-widest uppercase shadow-xl hover:opacity-90 transition-opacity">Contact</button>
                </div>
            </div>
        </div>

        <div id="promoPage" class="hidden w-full h-full flex flex-col relative">
            <div class="px-6 py-4 border-b border-white/5 bg-[#1a1c1e] flex justify-between items-center">
                <span class="text-xs font-bold tracking-[3px] text-[#C5A059] serif uppercase">Selected Pieces</span>
                <button onclick="switchPage('mainPage')" class="text-[10px] text-stone-500 hover:text-white uppercase tracking-wider">Close</button>
            </div>
            <div class="sub-page-content">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-4">${PORTFOLIO_LEFT_COLUMN}</div>
                    <div class="space-y-4 pt-8">${PORTFOLIO_RIGHT_COLUMN}</div>
                </div>
            </div>
        </div>

        <div id="contactPage" class="hidden w-full h-full flex flex-col">
            <div class="px-6 py-4 border-b border-white/5 bg-[#1a1c1e] flex justify-between items-center">
                <span class="text-xs font-bold tracking-[3px] text-[#C5A059] serif uppercase">Consultation</span>
                <button onclick="switchPage('mainPage')" class="text-[10px] text-stone-500 hover:text-white uppercase tracking-wider">Close</button>
            </div>
            <div class="sub-page-content space-y-4">
                <div class="space-y-3.5 pt-1">
                    <div class="space-y-1"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Name / Brand (필수)</label><input type="text" id="formClientName" placeholder="성함 또는 기업명을 입력하세요"></div>
                    <div class="space-y-1"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Contact (필수)</label><input type="text" id="formClientPhone" placeholder="010-0000-0000"></div>
                    <div class="space-y-1"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Project Type</label><input type="text" id="formProjectType" placeholder="예: 브랜딩, 상세페이지 제작"></div>
                    <div class="space-y-1"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Budget Range</label><input type="text" id="formBudget" placeholder="예: 300만원"></div>
                    <div class="space-y-1"><label class="text-[10px] text-stone-400 uppercase tracking-widest">Details</label><textarea id="formProjectDesc" rows="2" placeholder="프로젝트 목표 및 요청사항을 기술해주세요."></textarea></div>
                    <button onclick="submitEstimate()" id="submitBtn" class="gold-btn mt-2 py-3">SUBMIT BRIEF</button>
                </div>
            </div>
        </div>

        <div id="draggableChatWidget" class="floating-chat-widget">
            <button id="chatToggleBtn" class="chat-toggle-btn text-xl shadow-2xl">💬</button>
            <div id="chatWindow" class="chat-window hidden absolute bottom-16 right-0">
                <div class="bg-[#C5A059] px-4 py-2.5 text-black font-bold text-[10px] tracking-widest uppercase">✨ ${brand_name} AI Assistant</div>
                
                <div id="widgetMsgZone" class="widget-msg-zone bg-[#1a1c1e]">
                    <div class="flex flex-col gap-1.5 mb-2 p-1 border-b border-white/5 pb-3" style="${FAQ_DISPLAY}">
                        <span class="text-[9px] text-stone-500 uppercase tracking-wider block mb-1">추천 질문 선택</span>
                        <button onclick="clickFaqButton(event, this)" style="${FAQ1_DISPLAY}" class="text-left bg-stone-800 text-stone-300 text-[11px] px-3 py-2 rounded-xl border border-white/5 hover:border-[#C5A059] transition-all break-keep">${FAQ1_Q}</button>
                        <button onclick="clickFaqButton(event, this)" style="${FAQ2_DISPLAY}" class="text-left bg-stone-800 text-stone-300 text-[11px] px-3 py-2 rounded-xl border border-white/5 hover:border-[#C5A059] transition-all break-keep">${FAQ2_Q}</button>
                        <button onclick="clickFaqButton(event, this)" style="${FAQ3_DISPLAY}" class="text-left bg-stone-800 text-stone-300 text-[11px] px-3 py-2 rounded-xl border border-white/5 hover:border-[#C5A059] transition-all break-keep">${FAQ3_Q}</button>
                    </div>
                </div>
                
                <div class="p-3 bg-[#0c0d0e] flex gap-2 border-t border-white/5">
                    <input type="text" id="widgetInput" class="flex-1 text-[11px]" placeholder="Ask anything...">
                    <button type="button" id="sendBtn" class="bg-[#C5A059] text-black text-[11px] font-bold px-3 rounded-xl">전송</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const encodedData = "${GUIDELINE_TXT_URL}";
        let G_TXT = (encodedData === "error") ? "" : atob(encodedData);
        
        // 👑 [SNS 로고 아이콘 분기 주입 필터]
        function renderSnsLogos() {
            const snsTypes = ["${SNS1_TYPE}".toUpperCase(), "${SNS2_TYPE}".toUpperCase()];
            const targets = [document.getElementById('snsIconBtn1'), document.getElementById('snsIconBtn2')];
            
            // 인스타그램 & 네이버 블로그 공식 SVG 데이터
            const svgInsta = `<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`;
            const svgBlog = `<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19.167 0H4.833C2.163 0 0 2.163 0 4.833v14.334C0 21.837 2.163 24 4.833 24h14.334C21.837 24 24 21.837 24 19.167V4.833C24 2.163 21.837 0 19.167 0zM8.51 16.735H6.282V7.79h2.227v8.945zm6.98-4.473c0 1.242-.39 2.193-1.173 2.852-.782.66-1.892.99-3.328.99H9.46V7.79h1.53c2.793 0 4.19.98 4.19 2.943v1.529zm4.228-2.68c-.372.4-.908.6-1.606.6H17.21v1.64h1.168c.575 0 1.008.139 1.298.419.29.28.435.689.435 1.229v1.01h-2.9v-1.127H15.11v3.125h5.002c1.242 0 1.863-.618 1.863-1.854v-3.3c0-1.114-.523-1.745-1.568-1.892.682-.244 1.023-.748 1.023-1.512V9.824c0-1.603-.846-2.404-2.538-2.404h-4.902v3.124h4.902c.692 0 1.038.347 1.038 1.042v.997zM11.687 10.45c0-.419-.24-.628-.718-.628H9.46v1.312h1.51c.477 0 .717-.228.717-.684v-.001z"/></svg>`;
            const defaultIcon = `📁`;

            targets.forEach((btn, index) => {
                if(!btn) return;
                const type = snsTypes[index];
                if (type.includes("INSTA")) {
                    btn.innerHTML = svgInsta;
                } else if (type.includes("BLOG") || type.includes("NAVER")) {
                    btn.innerHTML = svgBlog;
                } else {
                    btn.innerText = defaultIcon;
                    btn.className += " text-xs font-bold bg-stone-800 px-2.5 py-1 rounded-xl border border-white/5";
                }
            });
        }

        function switchPage(id) { 
            ['mainPage', 'promoPage', 'contactPage'].forEach(el => document.getElementById(el).classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }
        
        let isWelcomeInserted = false;
        document.getElementById('chatToggleBtn').addEventListener('click', (e) => {
            // 드래그 직후 토글 클릭 방출을 막는 디바운싱 레이어
            if (document.getElementById('draggableChatWidget').hasAttribute('data-dragged')) {
                document.getElementById('draggableChatWidget').removeAttribute('data-dragged');
                return;
            }
            const chatWin = document.getElementById('chatWindow');
            chatWin.classList.toggle('hidden');
            
            if (!chatWin.classList.contains('hidden') && !isWelcomeInserted) {
                const msgZone = document.getElementById('widgetMsgZone');
                const welcomeHtml = `
                    <div id="gemiWelcomeMsg" class="flex flex-col items-start mb-2 order-first">
                        <div class="bg-[#333] p-3 rounded-2xl text-[11px] text-white leading-relaxed break-keep">
                            안녕하세요! 디렉터 ${user_name}님의 프로젝트 안내를 보조하는 AI 팀원입니다. ✨<br><br>전체적인 포트폴리오 안내 및 견적 문의에 대해 성심성의껏 안내해 드릴게요. 궁금한 점을 편하게 말씀해 주세요!
                        </div>
                    </div>
                `;
                msgZone.insertAdjacentHTML('beforeend', welcomeHtml);
                isWelcomeInserted = true;
                msgZone.scrollTop = msgZone.scrollHeight;
            }
        });

        // 👑 [하이브리드 터치/마우스 완벽 드래그 앤 드롭 자바스크립트 엔진]
        function initDraggableWidget() {
            const widget = document.getElementById('draggableChatWidget');
            const handle = document.getElementById('chatToggleBtn');
            let isDragging = false;
            let startX, startY, initialLeft, initialRight, initialBottom, initialTop;

            function dragStart(e) {
                isDragging = true;
                widget.removeAttribute('data-dragged');
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;
                
                const rect = widget.getBoundingClientRect();
                const parentRect = widget.parentElement.getBoundingClientRect();
                initialRight = parentRect.right - rect.right;
                initialBottom = parentRect.bottom - rect.bottom;
            }

            function dragMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                widget.setAttribute('data-dragged', 'true');
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                
                const deltaX = startX - clientX;
                const deltaY = startY - clientY;
                
                // 새로운 좌표를 우하단 기준 마진(Right/Bottom)으로 동적 연산 제어
                widget.style.right = (initialRight + deltaX) + 'px';
                widget.style.bottom = (initialBottom + deltaY) + 'px';
            }

            function dragEnd() {
                isDragging = false;
            }

            // 모바일 터치 및 PC 마우스 이벤트 듀얼 바인딩
            handle.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', dragMove, { passive: false });
            document.addEventListener('mouseup', dragEnd);

            handle.addEventListener('touchstart', dragStart, { passive: true });
            document.addEventListener('touchmove', dragMove, { passive: false });
            document.addEventListener('touchend', dragEnd);
        }
        
        function clickFaqButton(e, btnElement) {
            const questionText = btnElement.innerText.trim();
            const inputField = document.getElementById('widgetInput');
            if (inputField) {
                inputField.value = questionText;
                sendAiMessage(e);
            }
        }

        async function submitEstimate() {
            const btn = document.getElementById('submitBtn');
            if (!btn) return;
            
            const nameEl = document.getElementById('formClientName');
            const phoneEl = document.getElementById('formClientPhone');
            const typeEl = document.getElementById('formProjectType');
            const budgetEl = document.getElementById('formBudget');
            const descEl = document.getElementById('formProjectDesc');
            
            if(!nameEl || !nameEl.value.trim()){
                alert("디렉터님이 성함을 알아야 연락드릴 수 있습니다. 이름 또는 브랜드명을 입력해주세요.");
                nameEl.focus(); return;
            }
            if(!phoneEl || !phoneEl.value.trim()){
                alert("연락처를 남겨주셔야 문의 내용에 대한 답변을 드릴 수 있습니다.");
                phoneEl.focus(); return;
            }

            const data = { 
                name: nameEl.value, 
                phone: phoneEl.value, 
                type: typeEl ? typeEl.value : '', 
                budget: budgetEl ? budgetEl.value : '', 
                desc: descEl ? descEl.value : '' 
            };
            
            btn.innerText = "SENDING...";
            btn.disabled = true;
            
            try {
                await fetch('${SUPABASE_URL}/rest/v1/gemi_customer_inquiry', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": "${SUPABASE_KEY}",
                        "Authorization": "Bearer ${SUPABASE_KEY}"
                    },
                    body: JSON.stringify({
                        brand_name: "${brand_name}",
                        customer_name: data.name,
                        customer_contact: data.phone,
                        inquiry_type: data.type,
                        message: `[예산: ${data.budget}] ${data.desc}`
                    })
                });

                fetch('https://gemi-5vfl.onrender.com/api/submit-inquiry', { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ 
                        customer_name: data.name, 
                        customer_contact: data.phone, 
                        inquiry_type: data.type, 
                        message: `[예산: ${data.budget}] ${data.desc}` 
                    }) 
                });
                
                alert("문의가 정상 전송되었습니다!");
            } catch (error) {
                alert("전송 중 오류가 발생했습니다: " + error.message);
            } finally {
                btn.innerText = "SUBMIT BRIEF";
                btn.disabled = false;
                switchPage('mainPage');
            }
        }

        async function sendAiMessage(e) {
            if(e && typeof e.preventDefault === 'function') e.preventDefault();

            const input = document.getElementById('widgetInput');
            const text = input.value.trim();
            if(!text) return;
            
            document.getElementById('widgetMsgZone').insertAdjacentHTML('beforeend', `<div class="flex flex-col items-end mb-2"><div class="bg-[#C5A059] p-3 rounded-2xl text-[11px] text-black">${text}</div></div>`);
            input.value = '';
            
            setTimeout(() => {
                const msgZone = document.getElementById('widgetMsgZone');
                if(msgZone) msgZone.scrollTop = msgZone.scrollHeight;
            }, 50);
            
            try {
                const safeGuideline = G_TXT
                    .replace(/\\/g, '\\\\')
                    .replace(/"/g, '\\"')
                    .replace(/\n/g, '\\n')
                    .replace(/\r/g, '\\r')
                    .replace(/\t/g, '\\t');

                const response = await fetch('https://gemi-5vfl.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text, 
                        guideline_txt: safeGuideline,
                        brand_name: "${brand_name}"
                    })
                });
                const data = await response.json();
                
                if (data.reply && data.reply.includes("오늘 준비된 대화 개수")) {
                    input.placeholder = "대화 한도가 소진되었습니다.";
                    input.disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                }

                document.getElementById('widgetMsgZone').insertAdjacentHTML('beforeend', `<div class="flex flex-col items-start mb-2"><div class="bg-[#333] p-3 rounded-2xl text-[11px] text-white break-keep leading-relaxed">${data.reply || data.error}</div></div>`);
                
                setTimeout(() => {
                    const msgZone = document.getElementById('widgetMsgZone');
                    if(msgZone) msgZone.scrollTop = msgZone.scrollHeight;
                }, 50);

            } catch(e) {
                document.getElementById('widgetMsgZone').insertAdjacentHTML('beforeend', `<div class="text-[10px] text-red-500">통신 실패: ${e.message}</div>`);
            }
        }
        
        // 👑 마스터 초기화 훅
        window.addEventListener('DOMContentLoaded', () => {
            renderSnsLogos();
            initDraggableWidget();
        });

        document.getElementById('sendBtn').addEventListener('click', sendAiMessage);
        document.getElementById('widgetInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAiMessage(e); });
    </script>
</body>
</html>
